name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Build (Frontend & Pre-rendering)
        run: npm run build
        env:
          # Inject relevant build environment variables here if needed
          VITE_SITE_URL: https://mukeshsarees.com
          VITE_SITE_NAME: "Mukesh Saree Centre"

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          local-dir: ./dist/
          # Exclude non-production server maps if any
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
