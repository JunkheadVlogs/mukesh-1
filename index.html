    <!-- Real-time Browser Console Telemetry for AI Studio Debugging -->
    <script>
      (function() {
        const originalLog = console.log;
        const originalWarn = console.warn;
        const originalError = console.error;
        
        function sendPayload(type, args) {
          try {
            const messages = Array.from(args).map(arg => {
              if (arg instanceof Error) {
                return arg.message + '\n' + arg.stack;
              }
              if (typeof arg === 'object') {
                try { return JSON.stringify(arg); } catch(e) { return String(arg); }
              }
              return String(arg);
            });
            
            const payload = JSON.stringify({
              type: type,
              messages: messages,
              timestamp: new Date().toISOString()
            });

            fetch('/api/browser-log', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: payload,
              keepalive: true
            }).catch(() => {});
          } catch (e) {
            // Keep completely safe
          }
        }

        console.log = function() {
          originalLog.apply(console, arguments);
          sendPayload('log', arguments);
        };

        console.warn = function() {
          originalWarn.apply(console, arguments);
          sendPayload('warn', arguments);
        };

        console.error = function() {
          originalError.apply(console, arguments);
          sendPayload('error', arguments);
        };

        window.addEventListener('error', function(event) {
          sendPayload('uncaught', [
            event.message,
            'at ' + event.filename + ':' + event.lineno + ':' + event.colno,
            event.error
          ]);
        });

        window.addEventListener('unhandledrejection', function(event) {
          sendPayload('unhandled', [
            String(event.reason)
          ]);
        });

        originalLog('[TELEMETRY_INITIALIZED] Capture script primed successfully.');
      })();
    </script>

    <script>
    // Safe auto-dismiss timeout fallback for the premium boutique loading screen
    (function() {
      setTimeout(function() {
        var loader = document.querySelector('.loading-wrapper');
        if (loader) {
          console.warn('[DIAGNOSTIC SAFEGUARD] React mounting or asset load took longer than expected. Auto-fading static loading screen.');
          loader.style.transition = 'opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
          loader.style.opacity = '0';
          setTimeout(function() {
            if (loader && loader.parentNode) {
              loader.parentNode.removeChild(loader);
              console.log('[DIAGNOSTIC SAFEGUARD] Static loading screen removed safely.');
            }
          }, 600);
        }
      }, 3200);
    })();

    document.addEventListener("DOMContentLoaded", function() {
      try {
        (function () {
          const SHEET_URL = "https://script.google.com/macros/s/AKfycbzlyTIEbgAvjptwh6SRVYC2mzqUnjs9J_qhgTuM5sBXwWM6JMl9-cCCGiGyOGeEt_o/exec";
          const COOLDOWN_HOURS = 24;

          const memoryFallback = {};
          function safeGetItem(key) {
            try {
              return localStorage.getItem(key);
            } catch (e) {
              return memoryFallback[key] || null;
            }
          }
          function safeSetItem(key, val) {
            try {
              localStorage.setItem(key, val);
            } catch (e) {
              memoryFallback[key] = String(val);
            }
          }

          function shouldShow() {
            if (!COOLDOWN_HOURS) return true;
            const last = safeGetItem("eiShown");
            if (!last) return true;
            return (Date.now() - parseInt(last)) > COOLDOWN_HOURS * 3600000;
          }
          function markShown() { safeSetItem("eiShown", Date.now()); }

          // ── Modal HTML ──
          const modal = document.createElement("div");
          modal.id = "exitIntentModal";
          modal.innerHTML = `
            <div id="eiOverlay"></div>
            <div id="eiBox">
              <button id="eiClose">✕</button>

              <!-- STEP 1: Form -->
              <div id="eiStep1">
                <p id="eiTag">🎁 EXCLUSIVE MEMBERS OFFER</p>
                <h2 id="eiHeading">Wait! Get <span style="color:#b5894a">60% OFF</span></h2>
                <p id="eiSub">Enter your details below to unlock your secret coupon code instantly.</p>
                <input id="eiName"  type="text" placeholder="Your Name *" autocomplete="name" />
                <input id="eiPhone" type="tel"  placeholder="WhatsApp Number *" autocomplete="tel" />
                <input id="eiEmail" type="email" placeholder="Email (optional)" autocomplete="email" />
                <button id="eiSubmit">Unlock My 60% OFF Coupon →</button>
                <p id="eiMsg"></p>
                <p id="eiSkip">No thanks, I'll pay full price</p>
              </div>

              <!-- STEP 2: Coupon Reveal -->
              <div id="eiStep2" style="display:none">
                <div id="eiTick">🎉</div>
                <p id="eiTag2">YOUR EXCLUSIVE COUPON CODE</p>
                <h2 id="eiHeading2">You Got <span style="color:#b5894a">60% OFF!</span></h2>
                <p id="eiSubCoupon">Use this code at checkout on your next order:</p>
                <div id="eiCouponBox">
                  <span id="eiCouponCode">VIPCLUB60</span>
                  <button id="eiCopyBtn">Copy</button>
                </div>
                <p id="eiCopyMsg"></p>
                <p id="eiCouponNote">Valid on all products. Apply at checkout. Limited time only!</p>
                <button id="eiShopNow">Shop Now & Use Code →</button>
              </div>
            </div>`;
          document.body.appendChild(modal);

          // ── Styles ──
          const style = document.createElement("style");
          style.textContent = `
            #exitIntentModal { display:none; position:fixed; inset:0; z-index:999999; font-family:inherit; }
            #eiOverlay { position:absolute; inset:0; background:rgba(0,0,0,.6); }
            #eiBox {
              position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
              background:#fff; border-radius:16px; padding:36px 28px; width:min(92vw,420px);
              box-shadow:0 12px 50px rgba(0,0,0,.35); text-align:center;
            }
            #eiClose {
              position:absolute; top:12px; right:16px; background:none; border:none;
              font-size:20px; cursor:pointer; color:#999;
            }
            #eiTag, #eiTag2 { font-size:11px; letter-spacing:2px; color:#b5894a; font-weight:700; margin:0 0 8px; }
            #eiHeading, #eiHeading2 { font-size:24px; margin:0 0 8px; color:#1a0a00; line-height:1.3; }
            #eiSub, #eiSubCoupon, #eiCouponNote { font-size:13px; color:#666; margin:0 0 16px; }
            #eiBox input {
              display:block; width:100%; box-sizing:border-box;
              padding:12px 14px; margin:0 0 10px; border:1.5px solid #e0e0e0;
              border-radius:8px; font-size:14px; outline:none;
            }
            #eiBox input:focus { border-color:#b5894a; }
            #eiSubmit, #eiShopNow {
              width:100%; padding:14px; background:#1a0a00; color:#fff;
              border:none; border-radius:10px; font-size:15px; font-weight:700;
              cursor:pointer; margin-top:4px; transition:background .2s; letter-spacing:.5px;
            }
            #eiSubmit:hover, #eiShopNow:hover { background:#b5894a; }
            #eiSubmit:disabled { background:#aaa; cursor:not-allowed; }
            #eiMsg { font-size:13px; margin:8px 0 0; min-height:18px; }
            #eiSkip { font-size:12px; color:#bbb; cursor:pointer; margin:12px 0 0; text-decoration:underline; }

            /* Coupon Box */
            #eiTick { font-size:48px; margin:0 0 8px; }
            #eiCouponBox {
              display:flex; align-items:center; justify-content:center; gap:10px;
              background:#fff8ee; border:2.5px dashed #b5894a; border-radius:10px;
              padding:16px 20px; margin:0 0 10px;
            }
            #eiCouponCode {
              font-size:26px; font-weight:900; color:#1a0a00; letter-spacing:3px;
            }
            #eiCopyBtn {
              background:#b5894a; color:#fff; border:none; border-radius:6px;
              padding:7px 14px; font-size:13px; font-weight:700; cursor:pointer;
            }
            #eiCopyBtn:hover { background:#1a0a00; }
            #eiCopyMsg { font-size:12px; color:green; min-height:16px; margin:0 0 10px; }
            #eiCouponNote { font-size:12px; color:#aaa; margin:0 0 16px; }
          `;
          document.head.appendChild(style);

          function showModal() {
            if (!shouldShow()) return;
            modal.style.display = "block";
            markShown();
          }
          function hideModal() { modal.style.display = "none"; }

          const closeBtn = document.getElementById("eiClose");
          const skipBtn = document.getElementById("eiSkip");
          const overlayDiv = document.getElementById("eiOverlay");

          if (closeBtn) closeBtn.addEventListener("click", hideModal);
          if (skipBtn) skipBtn.addEventListener("click", hideModal);
          if (overlayDiv) overlayDiv.addEventListener("click", hideModal);

          // ── Triggers ──
          window.addEventListener("load", function() {
            document.addEventListener("mouseleave", function (e) {
              if (e.clientY < 10) showModal();
            });
            if (/Mobi|Android/i.test(navigator.userAgent)) {
              setTimeout(showModal, 5000);
            }
            let lastScrollY = 0;
            window.addEventListener("scroll", function () {
              const sy = window.scrollY;
              if (lastScrollY - sy > 60 && sy > 200) showModal();
              lastScrollY = sy;
            }, { passive: true });
          });

          // ── Submit ──
          const submitBtn = document.getElementById("eiSubmit");
          if (submitBtn) {
            submitBtn.addEventListener("click", function () {
              const nameEl = document.getElementById("eiName");
              const phoneEl = document.getElementById("eiPhone");
              const emailEl = document.getElementById("eiEmail");
              const msgEl = document.getElementById("eiMsg");

              if (!nameEl || !phoneEl || !msgEl) return;

              const name  = nameEl.value.trim();
              const phone = phoneEl.value.trim();
              const email = emailEl ? emailEl.value.trim() : "";

              if (!name)  { msgEl.style.color="red"; msgEl.textContent="⚠ Please enter your name."; return; }
              if (!phone || phone.length < 10) { msgEl.style.color="red"; msgEl.textContent="⚠ Please enter a valid WhatsApp number."; return; }

              submitBtn.disabled = true;
              submitBtn.textContent = "Unlocking...";
              msgEl.textContent = "";

              const params = new URLSearchParams({
                name, phone, email,
                source: "exit_intent",
                page: window.location.href,
                timestamp: new Date().toISOString()
              });

              fetch(SHEET_URL + "?" + params.toString(), { method: "GET", mode: "no-cors" })
                .then(() => {
                  // Show coupon step
                  const step1 = document.getElementById("eiStep1");
                  const step2 = document.getElementById("eiStep2");
                  if (step1) step1.style.display = "none";
                  if (step2) step2.style.display = "block";
                })
                .catch(() => {
                  // Even if fetch fails, show coupon (don't block user)
                  const step1 = document.getElementById("eiStep1");
                  const step2 = document.getElementById("eiStep2");
                  if (step1) step1.style.display = "none";
                  if (step2) step2.style.display = "block";
                });
            });
          }

          // ── Copy Coupon ──
          const copyBtn = document.getElementById("eiCopyBtn");
          if (copyBtn) {
            copyBtn.addEventListener("click", function () {
              const copyMsg = document.getElementById("eiCopyMsg");
              if (!navigator.clipboard || !navigator.clipboard.writeText) {
                if (copyMsg) copyMsg.textContent = "Code: VIPCLUB60 — type it at checkout";
                return;
              }
              navigator.clipboard.writeText("VIPCLUB60").then(() => {
                if (copyMsg) copyMsg.textContent = "✓ Copied to clipboard!";
                copyBtn.textContent = "Copied ✓";
              }).catch(() => {
                if (copyMsg) copyMsg.textContent = "Code: VIPCLUB60 — type it at checkout";
              });
            });
          }

          // ── Shop Now button ──
          const shopBtn = document.getElementById("eiShopNow");
          if (shopBtn) {
            shopBtn.addEventListener("click", function () {
              hideModal();
              window.location.href = "https://mukeshsarees.com/shop";
            });
          }

        })();
      } catch (err) {
        console.error("[INDEX SCRIPT GUARD ERROR]", err);
      }
    });
    </script>
