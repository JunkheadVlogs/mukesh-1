    <script>
    (function () {
      /* 
        AFTER DEPLOYING: 
        To clear WhatsApp's OG image cache, use the WhatsApp Link Preview Debugger:
        1. Go to: https://developers.facebook.com/tools/debug/
        2. Paste: https://mukeshsarees.com
        3. Click "Debug" then "Scrape Again"
        4. Do same for: https://mukeshsarees.com/shop
        5. Wait 24 hours for WhatsApp cache to refresh
        OR — add a query param to the URL when sharing: 
        https://mukeshsarees.com?v=2 (forces new cache)
      */

      // ─── CONFIG ───────────────────────────────────────────────
      const SHEET_URL = "https://script.google.com/macros/s/AKfycbzlyTIEbgAvjptwh6SRVYC2mzqUnjs9J_qhgTuM5sBXwWM6JMl9-cCCGiGyOGeEt_o/exec"; // ← your existing sheet URL
      const SHOW_DELAY_MS   = 5000;   // show after 5s on mobile / scroll trigger
      const COOLDOWN_HOURS  = 24;     // re-show after 24h (set 0 to show EVERY visit)
      // ──────────────────────────────────────────────────────────

      function shouldShow() {
        if (!COOLDOWN_HOURS) return true;           // 0 = always show
        const last = localStorage.getItem("eiShown");
        if (!last) return true;
        return (Date.now() - parseInt(last)) > COOLDOWN_HOURS * 3600000;
      }

      function markShown() {
        localStorage.setItem("eiShown", Date.now());
      }

      // ── Build Modal HTML ──────────────────────────────────────
      const modal = document.createElement("div");
      modal.id = "exitIntentModal";
      modal.innerHTML = `
        <div id="eiOverlay"></div>
        <div id="eiBox">
          <button id="eiClose">✕</button>
          <p id="eiTag">EXCLUSIVE OFFER</p>
          <h2 id="eiHeading">Wait! Before You Go…</h2>
          <p id="eiSub">Get <strong>₹200 OFF</strong> your first order. Enter your details and we'll send your coupon.</p>
          <input id="eiName"  type="text"  placeholder="Your Name"         autocomplete="name" />
          <input id="eiPhone" type="tel"   placeholder="WhatsApp / Phone"  autocomplete="tel"  />
          <input id="eiEmail" type="email" placeholder="Email (optional)"  autocomplete="email"/>
          <button id="eiSubmit">Claim My Discount →</button>
          <p id="eiMsg"></p>
          <p id="eiSkip">No thanks, I'll pay full price</p>
        </div>`;
      document.body.appendChild(modal);

      // ── Styles ────────────────────────────────────────────────
      const style = document.createElement("style");
      style.textContent = `
        #exitIntentModal { display:none; position:fixed; inset:0; z-index:999999; font-family:inherit; }
        #eiOverlay       { position:absolute; inset:0; background:rgba(0,0,0,.55); }
        #eiBox {
          position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
          background:#fff; border-radius:12px; padding:32px 28px; width:min(90vw,420px);
          box-shadow:0 8px 40px rgba(0,0,0,.3); text-align:center;
        }
        #eiClose {
          position:absolute; top:10px; right:14px; background:none; border:none;
          font-size:18px; cursor:pointer; color:#666;
        }
        #eiTag     { font-size:11px; letter-spacing:2px; color:#b5894a; font-weight:700; margin:0 0 8px; }
        #eiHeading { font-size:22px; margin:0 0 8px; color:#1a0a00; }
        #eiSub     { font-size:14px; color:#555; margin:0 0 18px; }
        #eiBox input {
          display:block; width:100%; box-sizing:border-box;
          padding:11px 14px; margin:0 0 10px; border:1px solid #ddd;
          border-radius:8px; font-size:14px; outline:none;
        }
        #eiBox input:focus { border-color:#b5894a; }
        #eiSubmit {
          width:100%; padding:13px; background:#1a0a00; color:#fff;
          border:none; border-radius:8px; font-size:15px; font-weight:600;
          cursor:pointer; margin-top:4px; transition:background .2s;
        }
        #eiSubmit:hover  { background:#b5894a; }
        #eiSubmit:disabled { background:#aaa; cursor:not-allowed; }
        #eiMsg  { font-size:13px; margin:10px 0 0; color:green; min-height:18px; }
        #eiSkip { font-size:12px; color:#aaa; cursor:pointer; margin:10px 0 0; text-decoration:underline; }
      `;
      document.head.appendChild(style);

      // ── Show / Hide ───────────────────────────────────────────
      function showModal() {
        if (!shouldShow()) return;
        modal.style.display = "block";
        markShown();
      }
      function hideModal() { modal.style.display = "none"; }

      document.getElementById("eiClose").addEventListener("click", hideModal);
      document.getElementById("eiSkip").addEventListener("click", hideModal);
      document.getElementById("eiOverlay").addEventListener("click", hideModal);

      // ── Triggers ──────────────────────────────────────────────
      // 1. Desktop: mouse leaves top of viewport (true exit intent)
      document.addEventListener("mouseleave", function (e) {
        if (e.clientY < 10) showModal();
      });

      // 2. Mobile: show after SHOW_DELAY_MS seconds on page
      if (/Mobi|Android/i.test(navigator.userAgent)) {
        setTimeout(showModal, SHOW_DELAY_MS);
      }

      // 3. Mobile: show when user scrolls back up quickly (leaving intent)
      let lastScrollY = 0;
      window.addEventListener("scroll", function () {
        const sy = window.scrollY;
        if (lastScrollY - sy > 60 && sy > 200) showModal(); // scrolled up fast
        lastScrollY = sy;
      }, { passive: true });

      // ── Submit to Google Sheet ────────────────────────────────
      document.getElementById("eiSubmit").addEventListener("click", function () {
        const name  = document.getElementById("eiName").value.trim();
        const phone = document.getElementById("eiPhone").value.trim();
        const email = document.getElementById("eiEmail").value.trim();
        const msg   = document.getElementById("eiMsg");

        if (!name)  { msg.style.color="red"; msg.textContent="Please enter your name."; return; }
        if (!phone) { msg.style.color="red"; msg.textContent="Please enter your phone number."; return; }

        const btn = document.getElementById("eiSubmit");
        btn.disabled = true;
        btn.textContent = "Sending…";
        msg.textContent = "";

        const params = new URLSearchParams({
          name, phone, email,
          source: "exit_intent",
          page: window.location.href,
          timestamp: new Date().toISOString()
        });

        fetch(SHEET_URL + "?" + params.toString(), { method: "GET", mode: "no-cors" })
          .then(() => {
            msg.style.color = "green";
            msg.textContent = "✓ Saved! Your discount code will be sent on WhatsApp.";
            btn.textContent = "Done ✓";
            setTimeout(hideModal, 3000);
          })
          .catch(() => {
            msg.style.color = "red";
            msg.textContent = "Something went wrong. Please try again.";
            btn.disabled = false;
            btn.textContent = "Claim My Discount →";
          });
      });
    })();
    </script>
