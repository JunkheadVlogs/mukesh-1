    <div id="root">

    <script>
    (function () {
      const SHEET_URL = "https://script.google.com/macros/s/AKfycbzlyTIEbgAvjptwh6SRVYC2mzqUnjs9J_qhgTuM5sBXwWM6JMl9-cCCGiGyOGeEt_o/exec";
      const COOLDOWN_HOURS = 24;

      const memoryFallback = {};
      function safeGetItem(key) {
        try {
          return localStorage.getItem(key);
        } catch (e) {
          return memoryFallback[key] || null;
        }
      }
      function safeSetItem(key, val) {
        try {
          localStorage.setItem(key, val);
        } catch (e) {
          memoryFallback[key] = String(val);
        }
      }

      function shouldShow() {
        if (!COOLDOWN_HOURS) return true;
        const last = safeGetItem("eiShown");
        if (!last) return true;
        return (Date.now() - parseInt(last)) > COOLDOWN_HOURS * 3600000;
      }
      function markShown() { safeSetItem("eiShown", Date.now()); }

      // ── Modal HTML ──
      const modal = document.createElement("div");
      modal.id = "exitIntentModal";
      modal.innerHTML = `
        <div id="eiOverlay"></div>
        <div id="eiBox">
          <button id="eiClose">✕</button>

          <!-- STEP 1: Form -->
          <div id="eiStep1">
            <p id="eiTag">🎁 EXCLUSIVE MEMBERS OFFER</p>
            <h2 id="eiHeading">Wait! Get <span style="color:#b5894a">60% OFF</span></h2>
            <p id="eiSub">Enter your details below to unlock your secret coupon code instantly.</p>
            <input id="eiName"  type="text" placeholder="Your Name *" autocomplete="name" />
            <input id="eiPhone" type="tel"  placeholder="WhatsApp Number *" autocomplete="tel" />
            <input id="eiEmail" type="email" placeholder="Email (optional)" autocomplete="email" />
            <button id="eiSubmit">Unlock My 60% OFF Coupon →</button>
            <p id="eiMsg"></p>
            <p id="eiSkip">No thanks, I'll pay full price</p>
          </div>

          <!-- STEP 2: Coupon Reveal -->
          <div id="eiStep2" style="display:none">
            <div id="eiTick">🎉</div>
            <p id="eiTag2">YOUR EXCLUSIVE COUPON CODE</p>
            <h2 id="eiHeading2">You Got <span style="color:#b5894a">60% OFF!</span></h2>
            <p id="eiSubCoupon">Use this code at checkout on your next order:</p>
            <div id="eiCouponBox">
              <span id="eiCouponCode">VIPCLUB60</span>
              <button id="eiCopyBtn">Copy</button>
            </div>
            <p id="eiCopyMsg"></p>
            <p id="eiCouponNote">Valid on all products. Apply at checkout. Limited time only!</p>
            <button id="eiShopNow">Shop Now & Use Code →</button>
          </div>
        </div>`;
      document.body.appendChild(modal);

      // ── Styles ──
      const style = document.createElement("style");
      style.textContent = `
        #exitIntentModal { display:none; position:fixed; inset:0; z-index:999999; font-family:inherit; }
        #eiOverlay { position:absolute; inset:0; background:rgba(0,0,0,.6); }
        #eiBox {
          position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
          background:#fff; border-radius:16px; padding:36px 28px; width:min(92vw,420px);
          box-shadow:0 12px 50px rgba(0,0,0,.35); text-align:center;
        }
        #eiClose {
          position:absolute; top:12px; right:16px; background:none; border:none;
          font-size:20px; cursor:pointer; color:#999;
        }
        #eiTag, #eiTag2 { font-size:11px; letter-spacing:2px; color:#b5894a; font-weight:700; margin:0 0 8px; }
        #eiHeading, #eiHeading2 { font-size:24px; margin:0 0 8px; color:#1a0a00; line-height:1.3; }
        #eiSub, #eiSubCoupon, #eiCouponNote { font-size:13px; color:#666; margin:0 0 16px; }
        #eiBox input {
          display:block; width:100%; box-sizing:border-box;
          padding:12px 14px; margin:0 0 10px; border:1.5px solid #e0e0e0;
          border-radius:8px; font-size:14px; outline:none;
        }
        #eiBox input:focus { border-color:#b5894a; }
        #eiSubmit, #eiShopNow {
          width:100%; padding:14px; background:#1a0a00; color:#fff;
          border:none; border-radius:10px; font-size:15px; font-weight:700;
          cursor:pointer; margin-top:4px; transition:background .2s; letter-spacing:.5px;
        }
        #eiSubmit:hover, #eiShopNow:hover { background:#b5894a; }
        #eiSubmit:disabled { background:#aaa; cursor:not-allowed; }
        #eiMsg { font-size:13px; margin:8px 0 0; min-height:18px; }
        #eiSkip { font-size:12px; color:#bbb; cursor:pointer; margin:12px 0 0; text-decoration:underline; }

        /* Coupon Box */
        #eiTick { font-size:48px; margin:0 0 8px; }
        #eiCouponBox {
          display:flex; align-items:center; justify-content:center; gap:10px;
          background:#fff8ee; border:2.5px dashed #b5894a; border-radius:10px;
          padding:16px 20px; margin:0 0 10px;
        }
        #eiCouponCode {
          font-size:26px; font-weight:900; color:#1a0a00; letter-spacing:3px;
        }
        #eiCopyBtn {
          background:#b5894a; color:#fff; border:none; border-radius:6px;
          padding:7px 14px; font-size:13px; font-weight:700; cursor:pointer;
        }
        #eiCopyBtn:hover { background:#1a0a00; }
        #eiCopyMsg { font-size:12px; color:green; min-height:16px; margin:0 0 10px; }
        #eiCouponNote { font-size:12px; color:#aaa; margin:0 0 16px; }
      `;
      document.head.appendChild(style);

      function showModal() {
        if (!shouldShow()) return;
        modal.style.display = "block";
        markShown();
      }
      function hideModal() { modal.style.display = "none"; }

      document.getElementById("eiClose").addEventListener("click", hideModal);
      document.getElementById("eiSkip").addEventListener("click", hideModal);
      document.getElementById("eiOverlay").addEventListener("click", hideModal);

      // ── Triggers ──
      document.addEventListener("mouseleave", function (e) {
        if (e.clientY < 10) showModal();
      });
      if (/Mobi|Android/i.test(navigator.userAgent)) {
        setTimeout(showModal, 5000);
      }
      let lastScrollY = 0;
      window.addEventListener("scroll", function () {
        const sy = window.scrollY;
        if (lastScrollY - sy > 60 && sy > 200) showModal();
        lastScrollY = sy;
      }, { passive: true });

      // ── Submit ──
      document.getElementById("eiSubmit").addEventListener("click", function () {
        const name  = document.getElementById("eiName").value.trim();
        const phone = document.getElementById("eiPhone").value.trim();
        const email = document.getElementById("eiEmail").value.trim();
        const msg   = document.getElementById("eiMsg");

        if (!name)  { msg.style.color="red"; msg.textContent="⚠ Please enter your name."; return; }
        if (!phone || phone.length < 10) { msg.style.color="red"; msg.textContent="⚠ Please enter a valid WhatsApp number."; return; }

        const btn = document.getElementById("eiSubmit");
        btn.disabled = true;
        btn.textContent = "Unlocking...";
        msg.textContent = "";

        const params = new URLSearchParams({
          name, phone, email,
          source: "exit_intent",
          page: window.location.href,
          timestamp: new Date().toISOString()
        });

        fetch(SHEET_URL + "?" + params.toString(), { method: "GET", mode: "no-cors" })
          .then(() => {
            // Show coupon step
            document.getElementById("eiStep1").style.display = "none";
            document.getElementById("eiStep2").style.display = "block";
          })
          .catch(() => {
            // Even if fetch fails, show coupon (don't block user)
            document.getElementById("eiStep1").style.display = "none";
            document.getElementById("eiStep2").style.display = "block";
          });
      });

      // ── Copy Coupon ──
      document.getElementById("eiCopyBtn").addEventListener("click", function () {
        navigator.clipboard.writeText("VIPCLUB60").then(() => {
          document.getElementById("eiCopyMsg").textContent = "✓ Copied to clipboard!";
          document.getElementById("eiCopyBtn").textContent = "Copied ✓";
        }).catch(() => {
          document.getElementById("eiCopyMsg").textContent = "Code: VIPCLUB60 — type it at checkout";
        });
      });

      // ── Shop Now button ──
      document.getElementById("eiShopNow").addEventListener("click", function () {
        hideModal();
        window.location.href = "https://mukeshsarees.com/shop";
      });

    })();
    </script>
  </body>
